name: CI-CD Node.js

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Correr pruebas
        run: npm test

      - name: Correr linter
        run: npm run lint

      - name: Construir imagen Docker
        run: docker build -t github-actions-node .

      - name: Desplegar con Docker Compose
        run: docker compose up -d